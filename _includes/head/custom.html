{% include base_path %}

<!-- start custom head snippets -->

<link rel="apple-touch-icon" href="{{ base_path }}/favicon.png">
<link rel="icon" type="image/png" href="{{ base_path }}/favicon.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<link rel="shortcut icon" href="{{ base_path }}/favicon.png" type="image/png">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/favicon.png">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>


<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
(function(){ var t = localStorage.getItem('theme'); if (t !== 'light') document.documentElement.setAttribute('data-theme', 'dark'); })();
</script>
<!-- end custom head snippets -->
